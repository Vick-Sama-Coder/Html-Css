<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Area</title>
    <style>
        .container{
            display: grid;
            height: 300px;
            border: 2px solid rgb(11, 170, 170);
            grid-template: repeat(3, 1fr) / repeat(4, 1fr);
            text-align: center;
            gap: 5px;
        }
        .box1{
            grid-row: 1 / 2;
            grid-column: 1 / -1;  
            background-color: tomato;
        }
        .box2{
            grid-row:2 / -1;
            grid-column:1 / 3;
            background-color: gold;
        }
        .box3{
            grid-row: 2 / -1;
            grid-column: 3 / -1;
            background-color: aqua;
        
        }
    </style>
</head>
<body>
    <Div class="container">
        <div class="box1">Box 1</div>
        <div class="box2">Box 2</div>
        <div class="box3">Box 3</div>
    </Div>

</body>
</html>
