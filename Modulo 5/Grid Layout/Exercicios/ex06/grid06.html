<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Area</title>
    <style>
        .container{
            display: grid;
            height: 300px;
            border: 2px solid rgb(11, 170, 170);
            grid-template: repeat(3, 1fr) / repeat(4, 1fr);
            text-align: center;
            gap: 5px;
        }
        .box1{
            /*
            Span é a expansao tanto da row ou column que é basicamente o 'end-start', ou seja, start é 1 e end é 5 o span sera 4 porque será 5 - 1 = 4, e o Span é sempre para o end.


            Grid Area é "Shorthand" para Grid-row/column, na seguinte ordem Rstart / Cstart / Rend / Cend.
            */
            grid-area: 1 / 1 / span 1 / span 4;  
            background-color: tomato;
        }
        .box2{
            grid-area: 2 / 1 / 4 / 3;
            background-color: gold;
        }
        .box3{
            grid-area: 2 / 3 / span 2 / span 2;
            background-color: aqua;
        
        }
    </style>
</head>
<body>
    <Div class="container">
        <div class="box1">Box 1</div>
        <div class="box2">Box 2</div>
        <div class="box3">Box 3</div>
    </Div>

</body>
</html>
